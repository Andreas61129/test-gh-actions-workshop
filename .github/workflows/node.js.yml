name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. JOB: Installieren und Bauen
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - run: npm ci
    - run: npm run build --if-present
    
    # NEU: Den fertig gebauten Code als Artifact speichern
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        # WICHTIG: Passe "dist/" an deinen echten Build-Ordner an!
        path: dist/ 

  # 2. JOB: Installieren und Testen
  test:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    # NEU: Den fertig gebauten Code aus dem Build-Job laden
    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: build-output
        # WICHTIG: Muss exakt derselbe Pfad sein wie beim Upload!
        path: dist/
        
    - run: npm install
    - run: npm run test
